# codex.config.sample.toml
#
# codex-ai-service-kit 사용자를 위한 샘플 설정 파일입니다.
# 실제 프로젝트에 맞게 복사해서 수정하되, API Key, token, password 같은
# 민감정보는 이 파일에 작성하지 마세요.

[project]
name = "my-ai-service-project"
language = "ko"
description = "Codex를 활용한 AI 서비스 개발 프로젝트"

[workflow]
# 기본 개발 흐름:
# requirements -> function_breakdown -> mvp_planning -> structure -> build -> debug -> test -> refactor -> docs
start_from_requirements = true
prefer_mvp_first = true
avoid_big_bang_implementation = true

[skills]
# 기본적으로 사용할 Skill 목록 파일입니다.
lean_skills_file = "config/lean-skills.txt"

# 작업 단계별 권장 Skill입니다.
requirements = "requirements-definition"
function_breakdown = "function-breakdown"
mvp_planning = "mvp-planning"
project_structure = "project-structure-builder"
api_service = "api-service-builder"
agent_workflow = "ai-agent-workflow-builder"
debugging = "debugging-coach"
refactoring = "refactoring-coach"
documentation = "readme-report-writer"
security = "security-checker"

[defaults]
# 수강생 프로젝트에서는 단계별 안내와 작은 변경을 기본으로 합니다.
response_language = "ko"
explain_step_by_step = true
check_related_files_before_edit = true
preserve_existing_code = true
provide_run_instructions = true
provide_test_instructions = true

[security]
# 안전한 기본값입니다. 실제 비밀값은 .env에만 저장하고 GitHub에 올리지 마세요.
never_print_env_values = true
never_commit_env_file = true
avoid_hardcoded_secrets = true
mask_sensitive_values = true

# GitHub에 올리면 안 되는 파일 또는 패턴입니다.
ignored_secret_files = [
  ".env",
  ".env.*",
  "credentials.json",
  "auth.json",
  "token.json",
  "*.pem",
  "*.key",
  "*.p12",
  "*.pfx"
]

[files]
# 산출물 기본 위치입니다.
requirements_doc = "docs/requirements.md"
function_breakdown_doc = "docs/function-breakdown.md"
mvp_plan_doc = "docs/mvp-plan.md"
api_spec_doc = "docs/api-spec.md"
agent_workflow_doc = "docs/agent-workflow.md"
test_scenario_doc = "docs/test-scenario.md"
final_report_doc = "docs/final-report.md"

[commands]
# 프로젝트마다 실행 명령이 다를 수 있으므로 샘플만 제공합니다.
# 실제 명령은 README.md에 프로젝트 기준으로 다시 작성하세요.
backend_dev = "uvicorn app.main:app --reload"
frontend_dev = "npm run dev"
test = "pytest"

